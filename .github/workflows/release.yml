name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version
        id: nvmrc
        run: echo "node=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.node }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron system dependencies (Linux)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            xvfb

      - name: Rebuild native modules
        run: pnpm rebuild
        working-directory: apps/desktop

      - name: Build (dev)
        run: pnpm build:dev

      - name: Run E2E tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" \
          pnpm --filter @spexr/e2e test
        env:
          DISPLAY: ":99"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  build:
    name: Build — ${{ matrix.os }}
    needs: e2e
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            pkg_cmd: package:mac
          - os: windows-latest
            platform: win
            pkg_cmd: package:win
          - os: ubuntu-latest
            platform: linux
            pkg_cmd: package:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version
        id: nvmrc
        shell: bash
        run: echo "node=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.node }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild
        working-directory: apps/desktop

      - name: Build all packages
        run: pnpm build

      - name: Package (production)
        run: pnpm ${{ matrix.pkg_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Mac signing: set CSC_LINK + CSC_KEY_PASSWORD + APPLE_ID + APPLE_TEAM_ID
          # in repo secrets to enable notarized builds.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          path: apps/desktop/dist-installers/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Pull the section for this version from CHANGELOG.md.
          # TAG comes from the on.push.tags filter (v[0-9]+.[0-9]+.[0-9]+)
          # so it is always a valid semver string — no user-controlled input.
          VERSION="${TAG#v}"
          NOTES=$(awk -v ver="$VERSION" \
            '/^## \[?[0-9]/ { if (found) exit; if (index($0, ver)) found=1; next } found { print }' \
            CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/marcellobarile/spexr-ide/blob/main/CHANGELOG.md) for details."
          fi
          {
            echo "notes<<EOF"
            printf '%s\n' "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SPEXR ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
