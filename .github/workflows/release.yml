name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version
        id: nvmrc
        run: echo "node=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.node }}
          cache: 'pnpm'

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libx11-dev libxkbfile-dev \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            xvfb

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild native modules for Electron
        run: pnpm --filter @spexr/desktop run rebuild

      - name: Build (dev)
        run: pnpm build:dev

      - name: Run E2E tests
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" \
            bash -c "pnpm --filter @spexr/e2e test"
        env:
          DISPLAY: ":99"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  build:
    name: Build — ${{ matrix.os }}
    needs: e2e
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            pkg_cmd: package:mac
          - os: windows-latest
            platform: win
            pkg_cmd: package:win
          - os: ubuntu-latest
            platform: linux
            pkg_cmd: package:linux

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version
        id: nvmrc
        shell: bash
        run: echo "node=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.node }}
          cache: 'pnpm'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y libx11-dev libxkbfile-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild native modules for Electron
        run: pnpm --filter @spexr/desktop run rebuild

      - name: Build all packages
        run: pnpm build

      # On Unix: bash cp -r preserves inner symlinks (no dereference), which
      # avoids circular-reference loops between pnpm workspace packages.
      # On Windows: bash [ -L ] does not detect NTFS junctions; use Node.js
      # which resolves junctions via fs.realpathSync.
      - name: Resolve pnpm workspace symlinks (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          nm="apps/desktop/node_modules"
          for scope in "$nm"/@*/; do
            for pkg in "$scope"*/; do
              [ -L "${pkg%/}" ] || continue
              target=$(node -e "console.log(require('fs').realpathSync(process.argv[1]))" -- "${pkg%/}")
              rm -rf "${pkg%/}"
              cp -r "$target" "${pkg%/}"
            done
          done
          for pkg in "$nm"/*/; do
            [ -L "${pkg%/}" ] || continue
            target=$(node -e "console.log(require('fs').realpathSync(process.argv[1]))" -- "${pkg%/}")
            rm -rf "${pkg%/}"
            cp -r "$target" "${pkg%/}"
          done

      - name: Resolve pnpm workspace junctions (Windows)
        if: runner.os == 'Windows'
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const workspaceRoot = process.cwd();
          const nodeModulesRoot = path.join(workspaceRoot, 'node_modules') + path.sep;
          const nodeModulesDir = path.join(workspaceRoot, 'apps', 'desktop', 'node_modules');

          function isWorkspacePackage(r) {
            return r.startsWith(workspaceRoot + path.sep) && !r.startsWith(nodeModulesRoot);
          }
          function processEntry(p) {
            let real; try { real = fs.realpathSync(p); } catch { return; }
            if (real === p || !isWorkspacePackage(real)) return;
            console.log('junction -> copy:', path.relative(workspaceRoot, p));
            try {
              fs.rmSync(p, { recursive: true, force: true });
              fs.cpSync(real, p, { recursive: true, dereference: true });
            } catch (e) { console.log('warn:', e.message); }
          }
          if (!fs.existsSync(nodeModulesDir)) process.exit(0);
          for (const e of fs.readdirSync(nodeModulesDir)) {
            if (e.startsWith('.')) continue;
            const full = path.join(nodeModulesDir, e);
            if (e.startsWith('@')) {
              try { for (const p of fs.readdirSync(full)) processEntry(path.join(full, p)); } catch {}
            } else { processEntry(full); }
          }

      - name: Package (production)
        # Invoke electron-builder directly (not via pnpm script) so --publish never
        # reaches electron-builder without pnpm re-quoting it as a literal "--".
        # Publishing is handled exclusively by the release job.
        working-directory: apps/desktop
        run: pnpm exec electron-builder --${{ matrix.platform }} --config electron-builder.yml --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          # Only upload finished installer files, not the unpacked app directories
          # (mac/, linux-unpacked/, win-unpacked/) which contain thousands of files
          # and trigger GitHub's secondary rate limit when published as release assets.
          path: |
            apps/desktop/dist-installers/*.dmg
            apps/desktop/dist-installers/*.zip
            apps/desktop/dist-installers/*.exe
            apps/desktop/dist-installers/*.AppImage
            apps/desktop/dist-installers/*.deb
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Delete existing release if any
        run: gh release delete "${GITHUB_REF_NAME}" --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Pull the section for this version from CHANGELOG.md.
          # TAG comes from the on.push.tags filter (v[0-9]+.[0-9]+.[0-9]+)
          # so it is always a valid semver string — no user-controlled input.
          VERSION="${TAG#v}"
          NOTES=$(awk -v ver="$VERSION" \
            '/^## \[?[0-9]/ { if (found) exit; if (index($0, ver)) found=1; next } found { print }' \
            CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/marcellobarile/spexr-ide/blob/main/CHANGELOG.md) for details."
          fi
          {
            echo "notes<<EOF"
            printf '%s\n' "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SPEXR ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            dist/**/*.dmg
            dist/**/*.zip
            dist/**/*.exe
            dist/**/*.AppImage
            dist/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
